<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SONABIO — Admin Avis</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --green-dark:  #2d4a2d;
      --green-mid:   #4a7a4a;
      --gold:        #c8a84a;
      --beige:       #f5f0e8;
      --white:       #ffffff;
      --text-dark:   #1a2a1a;
      --text-mid:    #4a5a4a;
      --text-light:  #8a9a8a;
      --red:         #c0392b;
      --shadow:      0 4px 20px rgba(45,74,45,.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; background: #f0f4f0; color: var(--text-dark); min-height: 100vh; }

    /* ── LOGIN ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
    }
    .login-box {
      background: var(--white); border-radius: 20px;
      padding: 48px 40px; width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      text-align: center;
    }
    .login-logo {
      font-size: 2rem; font-weight: 600; letter-spacing: .1em;
      color: var(--green-dark); margin-bottom: 6px;
    }
    .login-logo span { color: var(--gold); }
    .login-subtitle { font-size: .8rem; color: var(--text-light); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 36px; }
    .login-box input {
      width: 100%; padding: 14px 18px; margin-bottom: 14px;
      border: 1.5px solid #dde8dd; border-radius: 50px;
      font-family: 'Jost', sans-serif; font-size: .9rem;
      outline: none; transition: border-color .3s;
    }
    .login-box input:focus { border-color: var(--green-mid); }
    .login-btn {
      width: 100%; padding: 14px; background: var(--green-dark); color: var(--white);
      border: none; border-radius: 50px; font-family: 'Jost', sans-serif;
      font-size: .85rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
      cursor: pointer; transition: background .3s;
    }
    .login-btn:hover { background: var(--green-mid); }
    .login-error { color: var(--red); font-size: .8rem; margin-top: 12px; display: none; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }

    .topbar {
      background: var(--white); box-shadow: var(--shadow);
      padding: 0 40px; height: 70px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-logo { font-size: 1.4rem; font-weight: 600; letter-spacing: .08em; color: var(--green-dark); }
    .topbar-logo span { color: var(--gold); }
    .topbar-right { display: flex; align-items: center; gap: 20px; }
    .topbar-badge {
      background: var(--green-dark); color: var(--white);
      padding: 6px 16px; border-radius: 50px; font-size: .75rem; font-weight: 600;
    }
    .logout-btn {
      background: none; border: 1.5px solid #dde8dd; border-radius: 50px;
      padding: 7px 18px; font-family: 'Jost', sans-serif; font-size: .78rem;
      color: var(--text-mid); cursor: pointer; transition: all .3s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    .main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 8px; margin-bottom: 32px; }
    .tab-btn {
      padding: 10px 24px; border-radius: 50px; font-family: 'Jost', sans-serif;
      font-size: .8rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase;
      cursor: pointer; border: 1.5px solid #dde8dd; background: var(--white);
      color: var(--text-mid); transition: all .3s; position: relative;
    }
    .tab-btn.active { background: var(--green-dark); color: var(--white); border-color: var(--green-dark); }
    .tab-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--gold); color: var(--white);
      font-size: .65rem; font-weight: 700; margin-left: 8px;
    }

    /* ── CARDS GRID ── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

    .avis-card {
      background: var(--white); border-radius: 16px; padding: 24px;
      box-shadow: var(--shadow); transition: transform .2s;
      border-left: 4px solid transparent;
    }
    .avis-card:hover { transform: translateY(-3px); }
    .avis-card.pending  { border-left-color: var(--gold); }
    .avis-card.approved { border-left-color: var(--green-mid); }
    .avis-card.rejected { border-left-color: var(--red); opacity: .65; }

    .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .card-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--beige); color: var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; font-weight: 700;
    }
    .card-meta { flex: 1; }
    .card-nom   { font-weight: 600; font-size: .95rem; color: var(--text-dark); }
    .card-ville { font-size: .75rem; color: var(--text-light); }
    .card-date  { font-size: .72rem; color: var(--text-light); }

    .card-stars { display: flex; gap: 2px; margin-bottom: 10px; }
    .card-stars i { font-size: .75rem; color: var(--gold); }

    .card-message {
      font-size: .88rem; line-height: 1.6; color: var(--text-mid);
      margin-bottom: 18px; padding: 12px 16px;
      background: #f8faf8; border-radius: 10px;
    }

    .card-status {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 50px; font-size: .72rem; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase; margin-bottom: 16px;
    }
    .card-status.en_attente { background: #fff8e8; color: #a07a00; }
    .card-status.approuve   { background: #e8f5e8; color: var(--green-dark); }
    .card-status.refuse     { background: #fce8e8; color: var(--red); }

    .card-actions { display: flex; gap: 10px; }
    .btn-approve, .btn-reject, .btn-delete {
      flex: 1; padding: 10px 0; border-radius: 50px;
      font-family: 'Jost', sans-serif; font-size: .75rem; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase; cursor: pointer;
      border: none; transition: all .25s;
    }
    .btn-approve { background: var(--green-dark); color: var(--white); }
    .btn-approve:hover { background: var(--green-mid); }
    .btn-reject  { background: #fce8e8; color: var(--red); }
    .btn-reject:hover  { background: var(--red); color: var(--white); }
    .btn-delete  { background: #f0f0f0; color: var(--text-mid); flex: 0 0 44px; border-radius: 50%; width: 44px; height: 40px; padding: 0; }
    .btn-delete:hover  { background: var(--red); color: var(--white); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-light); grid-column: 1 / -1;
    }
    .empty-state i { font-size: 3rem; margin-bottom: 16px; display: block; }
    .empty-state p { font-size: .9rem; }

    /* ── LOADING ── */
    .loader {
      text-align: center; padding: 60px;
      color: var(--text-light); grid-column: 1 / -1;
    }
    .loader i { font-size: 2rem; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    .toast-admin {
      position: fixed; bottom: 30px; right: 30px; z-index: 9999;
      background: var(--green-dark); color: var(--white);
      padding: 14px 24px; border-radius: 12px; font-size: .85rem; font-weight: 500;
      box-shadow: 0 8px 30px rgba(0,0,0,.2);
      transform: translateY(80px); opacity: 0; transition: all .4s;
      display: flex; align-items: center; gap: 10px;
    }
    .toast-admin.show { transform: translateY(0); opacity: 1; }
    .toast-admin.error { background: var(--red); }

    @media (max-width: 600px) {
      .topbar { padding: 0 16px; }
      .main   { padding: 24px 12px; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ======== LOGIN ======== -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">SONA<span>BIO</span></div>
      <div class="login-subtitle">Administration</div>
      <input type="email"    id="admin-email"    placeholder="Email admin"/>
      <input type="password" id="admin-password" placeholder="Mot de passe"/>
      <button class="login-btn" onclick="seConnecter()">
        <i class="fas fa-lock" style="margin-right:8px;"></i>Se connecter
      </button>
      <div class="login-error" id="login-error">Email ou mot de passe incorrect</div>
    </div>
  </div>

  <!-- ======== DASHBOARD ======== -->
  <div id="dashboard">
    <div class="topbar">
      <div class="topbar-logo">SONA<span>BIO</span> <span style="font-size:.75rem;font-weight:400;color:var(--text-light);margin-left:8px;">Dashboard Avis</span></div>
      <div class="topbar-right">
        <div class="topbar-badge" id="pending-count-badge">0 en attente</div>
        <button class="logout-btn" onclick="seDeconnecter()"><i class="fas fa-sign-out-alt" style="margin-right:6px;"></i>Déconnexion</button>
      </div>
    </div>

    <div class="main">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('en_attente', this)">
          <i class="fas fa-clock" style="margin-right:6px;"></i>En attente
          <span class="tab-badge" id="badge-attente">0</span>
        </button>
        <button class="tab-btn" onclick="switchTab('approuve', this)">
          <i class="fas fa-check-circle" style="margin-right:6px;"></i>Approuvés
          <span class="tab-badge" id="badge-approuve" style="background:var(--green-mid);">0</span>
        </button>
        <button class="tab-btn" onclick="switchTab('refuse', this)">
          <i class="fas fa-times-circle" style="margin-right:6px;"></i>Refusés
          <span class="tab-badge" id="badge-refuse" style="background:var(--red);">0</span>
        </button>
      </div>

      <div class="cards-grid" id="cards-grid">
        <div class="loader"><i class="fas fa-spinner"></i></div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-admin" id="toast-admin"></div>

  <script type="module">
    import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
                                from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, orderBy, query, where,
             updateDoc, deleteDoc, doc }
                                from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBeVLRSqhbnZi41QQB61j8xiQYj0oI46_0",
      authDomain:        "sonabio-a23d4.firebaseapp.com",
      projectId:         "sonabio-a23d4",
      storageBucket:     "sonabio-a23d4.firebasestorage.app",
      messagingSenderId: "157550884752",
      appId:             "1:157550884752:web:976e9c806f52c9d846a515"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    /* ── Tous les avis en mémoire ── */
    let allAvis = {};
    let currentTab = "en_attente";

    /* ── Auth ── */
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("dashboard").style.display    = "block";
        startListening();
      } else {
        document.getElementById("login-screen").style.display = "flex";
        document.getElementById("dashboard").style.display    = "none";
      }
    });

    window.seConnecter = async function () {
      const email    = document.getElementById("admin-email").value.trim();
      const password = document.getElementById("admin-password").value;
      const errEl    = document.getElementById("login-error");
      errEl.style.display = "none";
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        errEl.style.display = "block";
      }
    };

    window.seDeconnecter = async function () {
      await signOut(auth);
    };

    /* ── Écoute temps réel tous les avis ── */
    function startListening() {
      const q = query(collection(db, "avis"), orderBy("date", "desc"));
      onSnapshot(q, (snapshot) => {
        allAvis = {};
        snapshot.forEach(d => { allAvis[d.id] = { id: d.id, ...d.data() }; });
        updateBadges();
        renderTab(currentTab);
      });
    }

    function updateBadges() {
      const counts = { en_attente: 0, approuve: 0, refuse: 0 };
      Object.values(allAvis).forEach(a => {
        const s = a.statut || "en_attente";
        if (counts[s] !== undefined) counts[s]++;
      });
      document.getElementById("badge-attente").textContent  = counts.en_attente;
      document.getElementById("badge-approuve").textContent = counts.approuve;
      document.getElementById("badge-refuse").textContent   = counts.refuse;
      document.getElementById("pending-count-badge").textContent =
        counts.en_attente + " en attente";
    }

    /* ── Render ── */
    function renderTab(tab) {
      const grid = document.getElementById("cards-grid");
      const list = Object.values(allAvis).filter(a => (a.statut || "en_attente") === tab);
      grid.innerHTML = "";

      if (list.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-inbox"></i>
            <p>Aucun avis dans cette catégorie</p>
          </div>`;
        return;
      }

      list.forEach(avis => {
        const initiales = getInitiales(avis.nom || "?");
        const dateStr   = avis.date?.toDate
          ? avis.date.toDate().toLocaleDateString("fr-FR", { day:"2-digit", month:"short", year:"numeric" })
          : "";

        const statusLabel = { en_attente: "⏳ En attente", approuve: "✅ Approuvé", refuse: "❌ Refusé" };
        const statusClass = avis.statut || "en_attente";

        const card = document.createElement("div");
        card.className = `avis-card ${statusClass === "en_attente" ? "pending" : statusClass === "approuve" ? "approved" : "rejected"}`;
        card.innerHTML = `
          <div class="card-header">
            <div class="card-avatar">${initiales}</div>
            <div class="card-meta">
              <div class="card-nom">${avis.nom || "Anonyme"}</div>
              <div class="card-ville">${avis.ville || "—"}</div>
            </div>
            <div class="card-date">${dateStr}</div>
          </div>
          <div class="card-stars">${starsHTML(avis.note || 5)}</div>
          <div class="card-message">${avis.message || ""}</div>
          <div class="card-status ${statusClass}">${statusLabel[statusClass] || statusClass}</div>
          <div class="card-actions">
            ${statusClass !== "approuve" ? `<button class="btn-approve" onclick="changerStatut('${avis.id}', 'approuve')"><i class="fas fa-check" style="margin-right:6px;"></i>Approuver</button>` : ""}
            ${statusClass !== "refuse"   ? `<button class="btn-reject"  onclick="changerStatut('${avis.id}', 'refuse')"><i class="fas fa-times" style="margin-right:6px;"></i>Refuser</button>`  : ""}
            <button class="btn-delete" onclick="supprimerAvis('${avis.id}')" title="Supprimer"><i class="fas fa-trash"></i></button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    window.changerStatut = async function (id, statut) {
      try {
        await updateDoc(doc(db, "avis", id), { statut });
        showToast(statut === "approuve" ? "✅ Avis approuvé — visible sur le site!" : "❌ Avis refusé");
      } catch (e) {
        showToast("Erreur: " + e.message, true);
      }
    };

    window.supprimerAvis = async function (id) {
      if (!confirm("Supprimer cet avis définitivement ?")) return;
      try {
        await deleteDoc(doc(db, "avis", id));
        showToast("🗑️ Avis supprimé");
      } catch (e) {
        showToast("Erreur: " + e.message, true);
      }
    };

    window.switchTab = function (tab, btn) {
      currentTab = tab;
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderTab(tab);
    };

    /* ── Helpers ── */
    function getInitiales(nom) {
      const parts = nom.trim().split(" ");
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return nom.substring(0, 2).toUpperCase();
    }

    function starsHTML(note) {
      let html = "";
      for (let i = 1; i <= 5; i++) {
        if (i <= note)            html += '<i class="fas fa-star"></i>';
        else if (i - 0.5 <= note) html += '<i class="fas fa-star-half-alt"></i>';
        else                      html += '<i class="far fa-star"></i>';
      }
      return html;
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById("toast-admin");
      t.textContent = msg;
      t.className   = "toast-admin show" + (isError ? " error" : "");
      setTimeout(() => t.classList.remove("show"), 3500);
    }
  </script>
</body>
</html>
